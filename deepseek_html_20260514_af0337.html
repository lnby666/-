<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智链全球 · 长三角数智中枢 | 企业级全模块系统</title>
    <!-- Leaflet 地图 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c); min-height: 100vh; }
        /* 登录页 */
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: rgba(12,22,35,0.95); border: 1px solid #0ff; border-radius: 48px;
            padding: 40px; width: 380px; text-align: center; box-shadow: 0 0 40px rgba(0,255,255,0.2);
        }
        .login-card h2, .login-card p { color: #eef; }
        .login-card input {
            width: 100%; padding: 12px 16px; margin: 12px 0;
            background: rgba(0,20,40,0.8); border: 1px solid #0ff; border-radius: 60px; color: white;
        }
        .login-card button {
            background: linear-gradient(95deg, #0066cc, #00a3cc); border: none;
            width: 100%; padding: 12px; border-radius: 60px; font-weight: bold; color: white; cursor: pointer;
        }
        /* 主应用 */
        .main-app { max-width: 1600px; margin: 0 auto; display: none; padding: 20px; }
        .top-bar {
            background: rgba(6,14,24,0.75); backdrop-filter: blur(12px); border-radius: 32px;
            padding: 12px 24px; margin-bottom: 20px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; border: 1px solid rgba(0,230,255,0.4);
        }
        .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #fff, #0ff); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .dashboard-layout { display: flex; gap: 20px; }
        .sidebar {
            width: 260px; background: rgba(0, 10, 20, 0.6); backdrop-filter: blur(4px);
            border-radius: 28px; padding: 16px 0; border: 1px solid rgba(0,255,255,0.3);
        }
        .menu-item {
            padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            color: #c4e0ff; transition: 0.2s; margin: 4px 12px; border-radius: 40px;
        }
        .menu-item i { width: 24px; color: #6cb4ff; }
        .menu-item.active, .menu-item:hover { background: rgba(0, 150, 255, 0.3); color: white; border-left: 3px solid #0ff; }
        .content-area {
            flex: 1; background: rgba(12,22,35,0.75); backdrop-filter: blur(8px); border-radius: 28px;
            padding: 20px; border: 1px solid rgba(0,200,255,0.35); overflow-x: auto; color: #f0f5ff;
        }
        .card { background: rgba(0, 20, 35, 0.7); border-radius: 24px; padding: 16px; margin-bottom: 20px; color: #eef; }
        h2, h3 { color: #aaffff; margin-bottom: 16px; border-left: 3px solid #0ff; padding-left: 12px; }
        .stats-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-card { flex:1; background: rgba(0,30,50,0.6); border-radius: 20px; padding: 16px; text-align: center; color: #eef; }
        .stat-value { font-size: 28px; font-weight: 800; color: #0ff; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; align-items: flex-end; }
        .filter-group { flex: 1; min-width: 140px; }
        .filter-group label { display: block; font-size: 12px; color: #bbd4ff; margin-bottom: 4px; }
        input, select { background: #0a2a3a; border: 1px solid #0ff; border-radius: 30px; padding: 8px 12px; color: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; color: #f0f5ff; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid rgba(0,255,255,0.2); }
        th { color: #aaffff; }
        .btn { padding: 6px 16px; border-radius: 30px; background: #1a3a4a; border: 1px solid #0ff; color: white; cursor: pointer; margin: 2px; }
        .btn-primary { background: linear-gradient(95deg, #0066cc, #00a3cc); border: none; }
        .modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content { background: #0a1a2a; border: 1px solid #0ff; border-radius: 32px; padding: 24px; max-width: 550px; width: 90%; color: white; }
        .modal-content h3 { color: #0ff; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-success { background: #33cc66; color: #1a3a2a; }
        .badge-warning { background: #ffaa33; color: #3a2a1a; }
        .badge-danger { background: #ff4444; color: white; }
        .badge-info { background: #3399ff; color: white; }
        .map-container { height: 380px; border-radius: 24px; overflow: hidden; border: 1px solid #0ff; margin-bottom: 16px; }
        .live-panel { background: rgba(0,40,60,0.5); border-radius: 20px; padding: 16px; color: #eef; }
        .slider-group { margin: 12px 0; color: #eef; }
        hr { border-color: rgba(0,255,255,0.2); margin: 12px 0; }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <i class="fas fa-globe-asia" style="font-size: 48px; color: #0ff; margin-bottom: 16px;"></i>
            <h2>智链全球 · 数智中枢</h2>
            <input type="text" id="loginUser" placeholder="企业账号" value="admin@trade.com">
            <input type="password" id="loginPass" placeholder="密码" value="123456">
            <button id="loginBtn">进入决策系统</button>
            <p style="margin-top: 16px; font-size: 12px; color: #bbd4ff;">演示账号任意输入</p>
        </div>
    </div>

    <!-- 主应用 -->
    <div id="mainApp" class="main-app">
        <div class="top-bar">
            <div class="logo"><i class="fas fa-brain"></i> 智链全球 · 长三角数智中枢</div>
            <div style="color:#eef;"><i class="fas fa-user-circle"></i> 决策驾驶舱 | 欢迎 运营总监</div>
        </div>
        <div class="dashboard-layout">
            <div class="sidebar">
                <div class="menu-item active" data-module="home"><i class="fas fa-home"></i> 驾驶舱</div>
                <div class="menu-item" data-module="order"><i class="fas fa-file-invoice"></i> 订单处理</div>
                <div class="menu-item" data-module="warehouse"><i class="fas fa-warehouse"></i> 仓储作业</div>
                <div class="menu-item" data-module="transport"><i class="fas fa-truck"></i> 运输监控</div>
                <div class="menu-item" data-module="customs"><i class="fas fa-passport"></i> 报关作业</div>
                <div class="menu-item" data-module="finance"><i class="fas fa-coins"></i> 财务结算</div>
                <div class="menu-item" data-module="analysis"><i class="fas fa-chart-line"></i> 决策分析</div>
                <div class="menu-item" data-module="service"><i class="fas fa-headset"></i> 客户服务</div>
            </div>
            <div class="content-area" id="dynamicContent"></div>
        </div>
    </div>

    <script>
        // ==================== 全局模拟数据 ====================
        // 订单数据
        let orders = [
            { id: "ORD-1001", customer: "Amazon EU", contact: "+44 20 1234", date: "2025-05-01", goods: "电子产品", amount: 124500, status: "processing", history: "2025-05-01 创建" },
            { id: "ORD-1002", customer: "DHL Global", contact: "+1 234 567", date: "2025-05-03", goods: "机械设备", amount: 87600, status: "transit", history: "2025-05-03 已出港" },
            { id: "ORD-1003", customer: "苏州电子", contact: "0512-1234", date: "2025-05-05", goods: "电子元件", amount: 32500, status: "customs", history: "2025-05-05 报关中" }
        ];
        // 仓储数据
        let warehouses = [
            { id: "WH-001", name: "智能芯片", location: "上海洋山仓", stock: 12500, type: "入库", date: "2025-05-01", operator: "张工", history: "批次A2301", inventoryHistory: "2025-04-01 入库20000件；2025-04-20 出库7500件" },
            { id: "WH-002", name: "锂电池组", location: "宁波北仑仓", stock: 8400, type: "出库", date: "2025-05-02", operator: "李工", history: "发往美国", inventoryHistory: "2025-04-15 入库10000件；2025-05-02 出库1600件" },
            { id: "WH-003", name: "光伏组件", location: "苏州工业园仓", stock: 3200, type: "盘点", date: "2025-05-03", operator: "王质检", history: "盘点差异: +120件", inventoryHistory: "2025-04-28 入库3500件；2025-05-03 盘点差异+120" }
        ];
        // 运输数据
        let transports = [
            { id: "TRK-001", customer: "Amazon EU", from: "上海港", to: "汉堡港", mode: "海运", carrier: "马士基", status: "航行中", trace: "已过马六甲海峡", positions: [{ node: "上海港", time: "2025-05-01 08:00" }, { node: "新加坡", time: "2025-05-05 14:00" }] },
            { id: "TRK-002", customer: "苏州电子", from: "浦东机场", to: "法兰克福", mode: "空运", carrier: "汉莎航空", status: "已起飞", trace: "航班 LH729", positions: [{ node: "浦东机场", time: "2025-05-03 10:30" }, { node: "莫斯科中转", time: "2025-05-03 18:00" }] },
            { id: "TRK-003", customer: "宁波五金", from: "宁波港", to: "洛杉矶", mode: "海运", carrier: "中远海运", status: "延迟", trace: "巴拿马运河拥堵", positions: [{ node: "宁波港", time: "2025-05-02 09:00" }, { node: "巴拿马运河", time: "2025-05-10 预估" }] }
        ];
        // 报关数据
        let customsData = [
            { id: "CUS-101", goodsName: "智能芯片", port: "上海外港", status: "已放行", date: "2025-05-01", company: "中外运", orderId: "ORD-1001", details: "税号: 85423100, 原产地: 中国" },
            { id: "CUS-102", goodsName: "锂电池组", port: "宁波北仑", status: "查验中", date: "2025-05-02", company: "中远报关", orderId: "ORD-1002", details: "税号: 85076000, 危险品" },
            { id: "CUS-103", goodsName: "光伏组件", port: "深圳盐田", status: "已申报", date: "2025-05-03", company: "华运通", orderId: "ORD-1003", details: "税号: 85414020" }
        ];
        // 财务结算数据
        let finances = [
            { id: "FIN-001", customer: "Amazon EU", amount: 124500, status: "已收款", date: "2025-05-02", method: "电汇", invoice: "INV-001", details: "汇率7.18" },
            { id: "FIN-002", customer: "DHL Global", amount: 87600, status: "待付款", date: "2025-05-03", method: "信用证", invoice: "INV-002", details: "60天账期" },
            { id: "FIN-003", customer: "苏州电子", amount: 32500, status: "部分收款", date: "2025-05-04", method: "托收", invoice: "INV-003", details: "已收定金50%" }
        ];
        // 决策分析数据
        let analyses = [
            { id: "AN-01", topic: "红海绕行成本分析", type: "航线优化", analyst: "王博士", date: "2025-05-01", status: "已完成", insights: "建议绕行好望角，成本+30%但风险降80%" },
            { id: "AN-02", topic: "碳关税影响评估", type: "合规分析", analyst: "李合规", date: "2025-05-02", status: "进行中", insights: "预计碳税增加$12k/柜" },
            { id: "AN-03", topic: "RCEP利用率报告", type: "贸易分析", analyst: "张经理", date: "2025-05-03", status: "待审核", insights: "东盟原产地证可节税8%" }
        ];
        // 客户服务数据
        let services = [
            { id: "SRV-01", customer: "DHL Global", type: "投诉", desc: "运输延误", created: "2025-05-01", status: "处理中", priority: "高", handler: "李客服", solution: "" },
            { id: "SRV-02", customer: "苏州电子", type: "咨询", desc: "HS编码归类", created: "2025-05-02", status: "已完成", priority: "中", handler: "王专家", solution: "已回复归类建议" },
            { id: "SRV-03", customer: "宁波五金", type: "索赔", desc: "货物破损", created: "2025-05-03", status: "待审核", priority: "高", handler: "张理赔", solution: "" }
        ];

        // 辅助弹窗
        function showModal(title, contentHtml) {
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `<div class="modal-content"><h3>${title}</h3><div>${contentHtml}</div><div style="margin-top:20px;text-align:right;"><button class="btn" onclick="this.closest('.modal').remove()">关闭</button></div></div>`;
            document.body.appendChild(modal);
        }
        window.showModal = showModal;

        // ==================== 模块一：订单处理 ====================
        function renderOrder() {
            let html = `<h2>📋 订单处理</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>订单编号</label><input id="o_id" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>客户名称</label><input id="o_cust" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>下单日期范围</label><input type="date" id="o_date_start"> 至 <input type="date" id="o_date_end"></div>
                <div class="filter-group"><label>货品类型</label><input id="o_goods" placeholder="货品"></div>
                <div class="filter-group"><label>订单状态</label><select id="o_status"><option value="">全部</option><option value="processing">处理中</option><option value="transit">运输中</option><option value="customs">报关中</option></select></div>
                <button id="searchOrderBtn" class="btn-primary">检索</button>
            </div>
            <div class="stats-row"><div class="stat-card">待处理订单: <span id="stat_processing">0</span></div></div>
            <div class="card"><table id="orderTable"><thead><tr><th>订单号</th><th>客户</th><th>日期</th><th>货品</th><th>金额(USD)</th><th>状态</th><th>操作</th></tr></thead><tbody></tbody></table></div>
            <button id="addOrderBtn" class="btn-primary">+ 新增订单</button>`;
            document.getElementById('dynamicContent').innerHTML = html;
            function renderTable(data) {
                let tbody = document.querySelector('#orderTable tbody');
                tbody.innerHTML = data.map(o => `<tr>
                    <td>${o.id}</td><td>${o.customer}</td><td>${o.date}</td><td>${o.goods}</td><td>$${o.amount.toLocaleString()}</td>
                    <td><span class="badge ${o.status==='processing'?'badge-warning':'badge-success'}">${o.status}</span></td>
                    <td><button class="btn" onclick="showModal('订单详情','<strong>订单号:</strong> ${o.id}<br><strong>客户:</strong> ${o.customer}<br><strong>金额:</strong> $${o.amount}<br><strong>历史:</strong> ${o.history}')">详情</button>
                    <button class="btn" onclick="let a=prompt('修改金额',${o.amount}); if(a){o.amount=parseFloat(a);renderTable(orders);showModal('修改成功','金额已更新');}">修改</button>
                    <button class="btn" onclick="let r=prompt('取消原因'); if(r){orders=orders.filter(x=>x.id!=='${o.id}');renderTable(orders);showModal('取消成功','订单已取消，原因:'+r);}">取消</button></td>
                </tr>`).join('');
                document.getElementById('stat_processing').innerText = data.filter(o=>o.status==='processing').length;
            }
            document.getElementById('searchOrderBtn').onclick = () => {
                let filtered = orders.filter(o => 
                    (!document.getElementById('o_id').value || o.id.includes(document.getElementById('o_id').value)) &&
                    (!document.getElementById('o_cust').value || o.customer.includes(document.getElementById('o_cust').value)) &&
                    (!document.getElementById('o_goods').value || o.goods.includes(document.getElementById('o_goods').value)) &&
                    (!document.getElementById('o_status').value || o.status === document.getElementById('o_status').value)
                );
                renderTable(filtered);
            };
            document.getElementById('addOrderBtn').onclick = () => { orders.push({ id:"ORD-"+Date.now(), customer:"新客户", contact:"-", date:new Date().toISOString().slice(0,10), goods:"新品", amount:10000, status:"processing", history:"新建" }); renderTable(orders); };
            renderTable(orders);
        }

        // ==================== 模块二：仓储作业 ====================
        function renderWarehouse() {
            let html = `<h2>🏭 仓储作业</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>货品编号</label><input id="w_id" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>货品名称</label><input id="w_name" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>仓库位置</label><input id="w_loc" placeholder="仓库位置"></div>
                <div class="filter-group"><label>作业类型</label><select id="w_type"><option value="">全部</option><option value="入库">入库</option><option value="出库">出库</option><option value="盘点">盘点</option></select></div>
                <div class="filter-group"><label>作业日期范围</label><input type="date" id="w_date_start"> 至 <input type="date" id="w_date_end"></div>
                <div class="filter-group"><label>作业状态</label><select id="w_status"><option value="">全部</option><option value="已完成">已完成</option><option value="进行中">进行中</option></select></div>
                <button id="searchWarehouseBtn" class="btn-primary">检索</button>
            </div>
            <div class="stats-row"><div class="stat-card">总库存量: <span id="totalStock">0</span> 件</div></div>
            <div class="card"><table><thead><tr><th>作业编号</th><th>货品名称</th><th>仓库位置</th><th>当前库存</th><th>作业类型</th><th>作业日期</th><th>操作员</th><th>操作</th></tr></thead><tbody id="warehouseTableBody"></tbody></table></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            function renderTable(data) {
                let tbody = document.getElementById('warehouseTableBody');
                tbody.innerHTML = data.map(w => `<tr>
                    <td>${w.id}</td><td>${w.name}</td><td>${w.location}</td><td>${w.stock.toLocaleString()}</td>
                    <td><span class="badge ${w.type==='入库'?'badge-success':(w.type==='出库'?'badge-warning':'badge-danger')}">${w.type}</span></td>
                    <td>${w.date}</td><td>${w.operator}</td>
                    <td><button class="btn" onclick="showModal('库存详情','<strong>货品:</strong> ${w.name}<br><strong>库存历史:</strong> ${w.inventoryHistory}<br><strong>当前库存:</strong> ${w.stock}件')">库存详情</button>
                    <button class="btn" onclick="let q=prompt('出库数量',100); if(q && q<=${w.stock}){ w.stock-=parseInt(q); w.type='出库'; renderTable(warehouses); showModal('出库处理','出库'+q+'件成功'); }else alert('库存不足')">出库处理</button>
                    <button class="btn" onclick="showModal('盘点记录','<strong>盘点差异分析:</strong><br>账面库存: ${w.stock}<br>实际库存: ${w.stock+(w.type==='盘点'?120:0)}<br>差异: ${w.type==='盘点'?'+120件':'无差异'}')">盘点记录</button></td>
                </tr>`).join('');
                document.getElementById('totalStock').innerText = data.reduce((s,w)=>s+w.stock,0).toLocaleString();
            }
            document.getElementById('searchWarehouseBtn').onclick = () => {
                let filtered = warehouses.filter(w => 
                    (!document.getElementById('w_id').value || w.id.includes(document.getElementById('w_id').value)) &&
                    (!document.getElementById('w_name').value || w.name.includes(document.getElementById('w_name').value)) &&
                    (!document.getElementById('w_loc').value || w.location.includes(document.getElementById('w_loc').value)) &&
                    (!document.getElementById('w_type').value || w.type === document.getElementById('w_type').value)
                );
                renderTable(filtered);
            };
            renderTable(warehouses);
        }

        // ==================== 模块三：运输监控 ====================
        function renderTransport() {
            let html = `<h2>🚚 运输监控</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>运输单号</label><input id="t_id" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>客户名称</label><input id="t_cust" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>运输方式</label><select id="t_mode"><option value="">全部</option><option value="海运">海运</option><option value="空运">空运</option></select></div>
                <div class="filter-group"><label>起运地</label><input id="t_from" placeholder="起运地"></div>
                <div class="filter-group"><label>目的地</label><input id="t_to" placeholder="目的地"></div>
                <div class="filter-group"><label>运输状态</label><select id="t_status"><option value="">全部</option><option value="航行中">航行中</option><option value="已起飞">已起飞</option><option value="延迟">延迟</option></select></div>
                <div class="filter-group"><label>运输日期范围</label><input type="date" id="t_date_start"> 至 <input type="date" id="t_date_end"></div>
                <button id="searchTransportBtn" class="btn-primary">检索</button>
            </div>
            <div class="card"><table><thead><tr><th>运输单号</th><th>客户</th><th>起运地</th><th>目的地</th><th>运输方式</th><th>承运商</th><th>状态</th><th>操作</th></tr></thead><tbody id="transportTableBody"></tbody></table></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            function renderTable(data) {
                let tbody = document.getElementById('transportTableBody');
                tbody.innerHTML = data.map(t => `<tr>
                    <td>${t.id}</td><td>${t.customer}</td><td>${t.from}</td><td>${t.to}</td><td>${t.mode}</td><td>${t.carrier}</td>
                    <td><span class="badge ${t.status==='航行中'?'badge-success':'badge-warning'}">${t.status}</span></td>
                    <td><button class="btn" onclick="showModal('运输详情','<strong>单号:</strong> ${t.id}<br><strong>轨迹:</strong> ${t.trace}<br><strong>节点:</strong> ${t.positions.map(p=>p.node+' '+p.time).join('<br>')}')">详情</button>
                    <button class="btn" onclick="let node=prompt('最新节点'); if(node){ t.positions.push({node,time:new Date().toLocaleString()}); t.trace+=' → '+node; renderTable(transports); showModal('位置更新','已记录节点'+node);}">位置更新</button>
                    <button class="btn" onclick="let ex=prompt('异常原因'); if(ex){ t.status='延迟'; t.trace+=' [异常:'+ex+']'; renderTable(transports); showModal('异常处理','异常已记录');}">异常处理</button></td>
                </tr>`).join('');
            }
            document.getElementById('searchTransportBtn').onclick = () => {
                let filtered = transports.filter(t => 
                    (!document.getElementById('t_id').value || t.id.includes(document.getElementById('t_id').value)) &&
                    (!document.getElementById('t_cust').value || t.customer.includes(document.getElementById('t_cust').value)) &&
                    (!document.getElementById('t_mode').value || t.mode === document.getElementById('t_mode').value) &&
                    (!document.getElementById('t_from').value || t.from.includes(document.getElementById('t_from').value)) &&
                    (!document.getElementById('t_to').value || t.to.includes(document.getElementById('t_to').value)) &&
                    (!document.getElementById('t_status').value || t.status === document.getElementById('t_status').value)
                );
                renderTable(filtered);
            };
            renderTable(transports);
        }

        // ==================== 模块四：报关作业 ====================
        function renderCustoms() {

                <div class="filter-group"><label>货品名称</label><input id="c_goods" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>报关状态</label><select id="c_status"><option value="">全部</option><option value="已放行">已放行</option><option value="查验中">查验中</option><option value="已申报">已申报</option></select></div>
                <div class="filter-group"><label>报关口岸</label><input id="c_port" placeholder="口岸"></div>
                <div class="filter-group"><label>申报日期范围</label><input type="date" id="c_date_start"> 至 <input type="date" id="c_date_end"></div>
                <div class="filter-group"><label>关联订单号</label><input id="c_order" placeholder="订单号"></div>

            function renderTable(data) {

                tbody.innerHTML = data.map(c => `<tr>
                    <td>${c.id}</td><td>${c.goodsName}</td><td>${c.port}</td>
                    <td><span class="badge ${c.status==='已放行'?'badge-success':(c.status==='查验中'?'badge-warning':'badge-info')}">${c.status}</span></td>
                    <td>${c.date}</td><td>${c.company}</td>
                    <td><button class="btn" onclick="showModal('报关详情','<strong>报关单:</strong> ${c.id}<br><strong>货品:</strong> ${c.goodsName}<br><strong>口岸:</strong> ${c.port}<br><strong>详情:</strong> ${c.details}<br><strong>关联订单:</strong> ${c.orderId}')">详情</button>
                    <button class="btn" onclick="let newData=prompt('编辑报关信息(货品,口岸)','${c.goodsName},${c.port}'); if(newData){ let parts=newData.split(','); c.goodsName=parts[0]; c.port=parts[1]; c.status='已申报'; c.date=new Date().toISOString().slice(0,10); renderTable(customsData); showModal('报关申报','已提交');}">报关申报</button>
                    <button class="btn" onclick="showModal('单证管理','<strong>所需单证:</strong><br>- 发票<br>- 装箱单<br>- 合同<br><button class=\"btn\" onclick=\"alert('模拟上传')\">点击上传</button>')">单证管理</button></td>
                </tr>`).join('');
            }
            document.getElementById('searchCustomsBtn').onclick = () => {
                let filtered = customsData.filter(c => 
                    (!document.getElementById('c_id').value || c.id.includes(document.getElementById('c_id').value)) &&
                    (!document.getElementById('c_goods').value || c.goodsName.includes(document.getElementById('c_goods').value)) &&
                    (!document.getElementById('c_status').value || c.status === document.getElementById('c_status').value) &&
                    (!document.getElementById('c_port').value || c.port.includes(document.getElementById('c_port').value)) &&
                    (!document.getElementById('c_order').value || c.orderId.includes(document.getElementById('c_order').value))
                );
                renderTable(filtered);
            };
            document.getElementById('addCustomsBtn').onclick = () => {
                let newId = "CUS-"+Date.now();
                customsData.push({ id:newId, goodsName:"新货品", port:"上海外港", status:"草稿", date:new Date().toISOString().slice(0,10), company:"报关行", orderId:"", details:"待补充" });
                renderTable(customsData);
                showModal("新增成功", `报关单${newId}已创建`);
            };

        // ==================== 模块五：财务结算 ====================
        function renderFinance() {
            let html = `<h2>💰 财务结算</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>结算单号</label><input id="f_id" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>客户名称</label><input id="f_cust" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>结算状态</label><select id="f_status"><option value="">全部</option><option value="已收款">已收款</option><option value="待付款">待付款</option><option value="部分收款">部分收款</option></select></div>
                <div class="filter-group"><label>结算方式</label><select id="f_method"><option value="">全部</option><option value="电汇">电汇</option><option value="信用证">信用证</option><option value="托收">托收</option></select></div>
                <div class="filter-group"><label>结算日期范围</label><input type="date" id="f_date_start"> 至 <input type="date" id="f_date_end"></div>
                <div class="filter-group"><label>金额范围(USD)</label><input type="number" id="f_amount_min" placeholder="最小值"> 至 <input type="number" id="f_amount_max" placeholder="最大值"></div>
                <button id="searchFinanceBtn" class="btn-primary">检索</button>
            </div>
            <div class="card"><table><thead><tr><th>结算单号</th><th>客户名称</th><th>结算金额</th><th>结算状态</th><th>结算日期</th><th>结算方式</th><th>操作</th></tr></thead><tbody id="financeTableBody"></tbody></table></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            function renderTable(data) {
                let tbody = document.getElementById('financeTableBody');
                tbody.innerHTML = data.map(f => `<tr>
                    <td>${f.id}</td><td>${f.customer}</td><td>$${f.amount.toLocaleString()}</td>
                    <td><span class="badge ${f.status==='已收款'?'badge-success':(f.status==='待付款'?'badge-warning':'badge-info')}">${f.status}</span></td>
                    <td>${f.date}</td><td>${f.method}</td>
                    <td><button class="btn" onclick="showModal('结算详情','<strong>结算单:</strong> ${f.id}<br><strong>客户:</strong> ${f.customer}<br><strong>金额:</strong> $${f.amount}<br><strong>发票号:</strong> ${f.invoice}')">详情</button>
                    <button class="btn" onclick="let ns=prompt('更新状态(已收款/待付款/部分收款)',f.status); if(ns && ['已收款','待付款','部分收款'].includes(ns)){ f.status=ns; renderTable(finances); showModal('结算处理','状态已更新');}">结算处理</button>
                    <button class="btn" onclick="showModal('发票管理','<strong>发票号:</strong> ${f.invoice}<br><button class=\"btn\" onclick=\"alert('模拟发送')\">发送邮件</button> <button class=\"btn\" onclick=\"alert('模拟下载')\">下载PDF</button>')">发票管理</button></td>
                </tr>`).join('');
            }
            document.getElementById('searchFinanceBtn').onclick = () => {
                let min = parseFloat(document.getElementById('f_amount_min').value);
                let max = parseFloat(document.getElementById('f_amount_max').value);
                let filtered = finances.filter(f => 
                    (!document.getElementById('f_id').value || f.id.includes(document.getElementById('f_id').value)) &&
                    (!document.getElementById('f_cust').value || f.customer.includes(document.getElementById('f_cust').value)) &&
                    (!document.getElementById('f_status').value || f.status === document.getElementById('f_status').value) &&
                    (!document.getElementById('f_method').value || f.method === document.getElementById('f_method').value) &&
                    (isNaN(min) || f.amount >= min) && (isNaN(max) || f.amount <= max)
                );
                renderTable(filtered);
            };
            renderTable(finances);
        }

        // ==================== 模块六：决策分析 ====================
        function renderAnalysis() {
            let html = `<h2>📊 决策分析</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>分析编号</label><input id="a_id" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>分析类型</label><select id="a_type"><option value="">全部</option><option value="航线优化">航线优化</option><option value="合规分析">合规分析</option><option value="贸易分析">贸易分析</option></select></div>
                <div class="filter-group"><label>分析周期</label><input id="a_period" placeholder="如 Q1-2025"></div>
                <div class="filter-group"><label>分析日期范围</label><input type="date" id="a_date_start"> 至 <input type="date" id="a_date_end"></div>
                <div class="filter-group"><label>分析状态</label><select id="a_status"><option value="">全部</option><option value="已完成">已完成</option><option value="进行中">进行中</option><option value="待审核">待审核</option></select></div>
                <button id="searchAnalysisBtn" class="btn-primary">检索</button>
            </div>
            <div class="card"><table><thead><tr><th>分析编号</th><th>分析主题</th><th>分析类型</th><th>分析师</th><th>分析日期</th><th>分析状态</th><th>操作</th></tr></thead><tbody id="analysisTableBody"></tbody></table></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            function renderTable(data) {
                let tbody = document.getElementById('analysisTableBody');
                tbody.innerHTML = data.map(a => `<tr>
                    <td>${a.id}</td><td>${a.topic}</td><td>${a.type}</td><td>${a.analyst}</td><td>${a.date}</td>
                    <td><span class="badge ${a.status==='已完成'?'badge-success':'badge-warning'}">${a.status}</span></td>
                    <td><button class="btn" onclick="showModal('分析详情','<strong>主题:</strong> ${a.topic}<br><strong>类型:</strong> ${a.type}<br><strong>分析师:</strong> ${a.analyst}<br><strong>结论:</strong> ${a.insights}')">详情</button>
                    <button class="btn" onclick="showModal('成本分析','模拟成本数据: 当前方案$100k vs 优化方案$85k, 节省15%')">成本分析</button>
                    <button class="btn" onclick="showModal('决策建议','基于此分析，建议: ${a.type==='航线优化'?'启用好望角绕行':(a.type==='合规分析'?'提前购买碳配额':'申请RCEP原产地证')}')">决策建议</button></td>
                </tr>`).join('');
            }
            document.getElementById('searchAnalysisBtn').onclick = () => {
                let filtered = analyses.filter(a => 
                    (!document.getElementById('a_id').value || a.id.includes(document.getElementById('a_id').value)) &&
                    (!document.getElementById('a_type').value || a.type === document.getElementById('a_type').value) &&
                    (!document.getElementById('a_status').value || a.status === document.getElementById('a_status').value)
                );
                renderTable(filtered);
            };
            renderTable(analyses);
        }

        // ==================== 模块七：客户服务 ====================
        function renderService() {
            let html = `<h2>🎧 客户服务</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>服务单号</label><input id="s_id" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>客户名称</label><input id="s_cust" placeholder="模糊匹配"></div>
                <div class="filter-group"><label>服务类型</label><select id="s_type"><option value="">全部</option><option value="投诉">投诉</option><option value="咨询">咨询</option><option value="索赔">索赔</option></select></div>
                <div class="filter-group"><label>处理状态</label><select id="s_status"><option value="">全部</option><option value="处理中">处理中</option><option value="已完成">已完成</option><option value="待审核">待审核</option></select></div>
                <div class="filter-group"><label>优先级</label><select id="s_priority"><option value="">全部</option><option value="高">高</option><option value="中">中</option></select></div>
                <div class="filter-group"><label>时间范围</label><input type="date" id="s_date_start"> 至 <input type="date" id="s_date_end"></div>
                <div class="filter-group"><label>负责人</label><input id="s_handler" placeholder="负责人"></div>
                <button id="searchServiceBtn" class="btn-primary">检索</button>
            </div>
            <div class="card"><table><thead><tr><th>服务单号</th><th>客户</th><th>类型</th><th>问题描述</th><th>创建时间</th><th>状态</th><th>优先级</th><th>操作</th></tr></thead><tbody id="serviceTableBody"></tbody></table></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            function renderTable(data) {
                let tbody = document.getElementById('serviceTableBody');
                tbody.innerHTML = data.map(s => `<tr>
                    <td>${s.id}</td><td>${s.customer}</td><td>${s.type}</td><td>${s.desc}</td><td>${s.created}</td>
                    <td><span class="badge ${s.status==='已完成'?'badge-success':'badge-warning'}">${s.status}</span></td>
                    <td><span class="badge ${s.priority==='高'?'badge-danger':'badge-info'}">${s.priority}</span></td>
                    <td><button class="btn" onclick="showModal('服务详情','<strong>单号:</strong> ${s.id}<br><strong>客户:</strong> ${s.customer}<br><strong>问题:</strong> ${s.desc}<br><strong>负责人:</strong> ${s.handler}<br><strong>解决方案:</strong> ${s.solution||'待处理'}')">详情</button>
                    <button class="btn" onclick="let sol=prompt('处理方案',s.solution); if(sol){ s.solution=sol; s.status='已完成'; renderTable(services); showModal('投诉处理','已处理');}">投诉处理</button>
                    <button class="btn" onclick="showModal('满意度评价','<button class=\"btn\" onclick=\"alert('感谢评价')\">满意</button> <button class=\"btn\" onclick=\"alert('我们会改进')\">不满意</button>')">满意度评价</button></td>
                </tr>`).join('');
            }
            document.getElementById('searchServiceBtn').onclick = () => {
                let filtered = services.filter(s => 
                    (!document.getElementById('s_id').value || s.id.includes(document.getElementById('s_id').value)) &&
                    (!document.getElementById('s_cust').value || s.customer.includes(document.getElementById('s_cust').value)) &&
                    (!document.getElementById('s_type').value || s.type === document.getElementById('s_type').value) &&
                    (!document.getElementById('s_status').value || s.status === document.getElementById('s_status').value) &&
                    (!document.getElementById('s_priority').value || s.priority === document.getElementById('s_priority').value) &&
                    (!document.getElementById('s_handler').value || (s.handler && s.handler.includes(document.getElementById('s_handler').value)))
                );
                renderTable(filtered);
            };
            renderTable(services);
        }

        // ==================== 驾驶舱（地图+实时风控+沙盒） ====================
        let map;
        function initMap() {
            map = L.map('mapContainer').setView([31.23, 121.47], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' }).addTo(map);
            const chinaPorts = [
                { name: "上海港", lat: 31.23, lng: 121.47, throughput: "4700万TEU" },
                { name: "宁波舟山港", lat: 29.86, lng: 121.55, throughput: "3500万TEU" },
                { name: "深圳港", lat: 22.54, lng: 113.93, throughput: "2800万TEU" }
            ];
            chinaPorts.forEach(p => {
                L.circleMarker([p.lat, p.lng], { radius: 12, color: '#0ff', fillColor: '#0ff', fillOpacity: 0.4 }).addTo(map).bindTooltip(`${p.name}<br>吞吐量: ${p.throughput}`);
                L.marker([p.lat, p.lng], { icon: L.divIcon({ html: `<div style="color:#0ff; background:#000a; border-radius:20px; padding:2px 8px;">${p.name}</div>`, iconSize: [80,20] }) }).addTo(map);
            });
        }
        let realData = { rate: 7.185, weather: "晴 18°C", updateTime: new Date() };
        function refreshRealtime() {
            realData.rate = (7.15 + Math.random() * 0.1).toFixed(4);
            const ws = ['晴','多云','小雨']; realData.weather = `${ws[Math.floor(Math.random()*3)]} ${15+Math.floor(Math.random()*10)}°C`;
            realData.updateTime = new Date();
            if(document.getElementById('liveRate')) document.getElementById('liveRate').innerText = realData.rate;
            if(document.getElementById('liveWeather')) document.getElementById('liveWeather').innerHTML = realData.weather;
            if(document.getElementById('updateTime')) document.getElementById('updateTime').innerText = realData.updateTime.toLocaleTimeString();
        }
        setInterval(refreshRealtime, 8000);

        function renderHome() {
            const html = `<div class="map-container" id="mapContainer"></div>
                <div class="live-panel"><h3>📡 实时风控看板</h3>
                <div class="stats-row"><div class="stat-card">USD/CNY: <span id="liveRate">${realData.rate}</span></div>
                <div class="stat-card">上海天气: <span id="liveWeather">${realData.weather}</span></div>
                <div class="stat-card">最后更新: <span id="updateTime">${realData.updateTime.toLocaleTimeString()}</span></div></div>
                <hr><h3>⚙️ 沙盒模拟 · 场景定制</h3>
                <div class="filter-group"><label>出发地</label><select id="origin"><option>上海港</option><option>宁波港</option></select></div>
                <div class="filter-group"><label>目的地</label><select id="dest"><option>洛杉矶</option><option>汉堡</option></select></div>
                <div class="filter-group"><label>运输方式</label><select id="mode"><option>海运</option><option>空运</option></select></div>
                <div class="slider-group"><label>安全 ← 权重 → 成本</label><input type="range" id="weightSlider" min="0" max="100" value="50"></div>
                <button id="runScenario" class="btn-primary">运行场景模拟</button>
                <div id="scenarioResult" class="card" style="margin-top:12px;">点击按钮查看优化方案</div></div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            setTimeout(() => initMap(), 100);
            document.getElementById('runScenario').onclick = () => {
                let origin = document.getElementById('origin').value;
                let dest = document.getElementById('dest').value;
                let mode = document.getElementById('mode').value;
                let weight = document.getElementById('weightSlider').value;
                document.getElementById('scenarioResult').innerHTML = `<strong>✅ 优化方案</strong><br>路径: ${origin} → ${dest} (${mode})<br>综合评分: ${Math.floor(70+weight/5)}分<br>建议: ${weight>70 ? '安全优先绕行好望角' : '成本优先走苏伊士'}`;
            };
            refreshRealtime();
        }

        // 菜单切换逻辑
        const modules = {
            home: renderHome, order: renderOrder, warehouse: renderWarehouse, transport: renderTransport,
            customs: renderCustoms, finance: renderFinance, analysis: renderAnalysis, service: renderService
        };
        function switchModule(module) { if(modules[module]) modules[module](); document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active')); document.querySelector(`.menu-item[data-module="${module}"]`).classList.add('active'); }
        document.querySelectorAll('.menu-item').forEach(item => item.addEventListener('click', () => switchModule(item.dataset.module)));

        // 登录
        document.getElementById('loginBtn').onclick = () => {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            switchModule('home');
        };
    </script>
</body>
</html>
